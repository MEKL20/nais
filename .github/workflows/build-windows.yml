name: Build Windows Desktop

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

jobs:
  build-windows:
    name: Build Windows installer
    runs-on: windows-latest

    defaults:
      run:
        shell: pwsh

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10.24.0

      - name: Setup Rust stable
        uses: dtolnay/rust-toolchain@stable

      - name: Cache Rust dependencies
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: apps/desktop/src-tauri -> target

      - name: Install JavaScript dependencies
        run: pnpm install --frozen-lockfile

      - name: Lint
        run: pnpm run lint

      - name: Build workspace packages
        run: |
          pnpm --filter @nais/character-schema run build
          pnpm --filter @nais/avatar-runtime run build
          pnpm --filter @nais/agent-adapter run build

      - name: Run tests
        run: pnpm run test

      - name: Build frontend
        run: pnpm --filter @nais/desktop run build

      - name: Build Tauri Windows installers
        run: pnpm --filter @nais/desktop run tauri:build

      - name: Upload MSI artifact
        uses: actions/upload-artifact@v4
        with:
          name: nais-windows-msi
          path: apps/desktop/src-tauri/target/release/bundle/msi/*.msi
          if-no-files-found: error

      - name: Upload EXE artifact
        uses: actions/upload-artifact@v4
        with:
          name: nais-windows-exe
          path: apps/desktop/src-tauri/target/release/bundle/nsis/*.exe
          if-no-files-found: error
