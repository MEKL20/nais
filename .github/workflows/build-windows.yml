name: Build Windows Desktop

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

jobs:
  build-windows:
    name: Build Windows installer
    runs-on: windows-latest

    defaults:
      run:
        shell: pwsh

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Setup Rust stable
        uses: dtolnay/rust-toolchain@stable

      - name: Cache Rust dependencies
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: apps/desktop/src-tauri -> target

      - name: Install JavaScript dependencies
        run: |
          npm cache clean --force
          npm ci --no-audit --no-fund --prefer-online --foreground-scripts

      - name: Build frontend
        run: npm run build

      - name: Build Tauri Windows installers
        run: npm --workspace @nais/desktop run tauri:build -- --bundles msi,nsis

      - name: Upload MSI artifact
        uses: actions/upload-artifact@v4
        with:
          name: nais-windows-msi
          path: apps/desktop/src-tauri/target/release/bundle/msi/*.msi
          if-no-files-found: error

      - name: Upload EXE artifact
        uses: actions/upload-artifact@v4
        with:
          name: nais-windows-exe
          path: apps/desktop/src-tauri/target/release/bundle/nsis/*.exe
          if-no-files-found: error
